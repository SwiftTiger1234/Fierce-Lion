<!DOCTYPE html>

<body>

  <!-- ==============================
       NAVIGATION BUTTONS
       ============================== -->
  <div class="button">
    <!-- Each button links to a different page -->

    <button class="About" onclick="location.href='About Me.html'">About Me</button>

       TOP SECTION / BIOGRAPHY
       ============================== -->

  <!-- ==============================

       ============================== -->
       <h1>💖✨🌸👇My Cute Calculator👇✨🌸💖</h1>
       <p class="paragraph">😎😘Try Out My Exciting Cute Calculator😎😘</p>
  


  <h1>🧮 Ara's Cute Calculator ✨</h1>

  <!-- 🎀 Calculator Box -->
  <div class="calculator">
    <!-- 📟 Display -->
    <input type="text" id="display" class="display" disabled>

    <!-- 🔘 Buttons -->
    <div class="buttons">
      <button onclick="appendValue('7')">7</button>
      <button onclick="appendValue('8')">8</button>
      <button onclick="appendValue('9')">9</button>
      <button onclick="appendValue('/')">÷</button>

      <button onclick="appendValue('4')">4</button>
      <button onclick="appendValue('5')">5</button>
      <button onclick="appendValue('6')">6</button>
      <button onclick="appendValue('*')">×</button>

      <button onclick="appendValue('1')">1</button>
      <button onclick="appendValue('2')">2</button>
      <button onclick="appendValue('3')">3</button>
      <button onclick="appendValue('-')">−</button>

      <button onclick="appendValue('0')">0</button>
      <button onclick="appendValue('.')">.</button>
      <button class="equal" onclick="calculate()">=</button>
      <button onclick="appendValue('+')">+</button>

      <button onclick="clearDisplay()" style="grid-column: span 4; background:#ffb3b3;">C</button>
    </div>
  </div>

  <!-- ==================== -->
  <!-- 🧾 JavaScript Logic -->
  <!-- ==================== -->
  <script>
    let display = document.getElementById("display");

    // Add numbers/operators to screen
    function appendValue(value) {
      display.value += value;
    }

    // Clear everything
    function clearDisplay() {
      display.value = "";
    }

    // Calculate the result
    function calculate() {
      try {
        display.value = eval(display.value); // evaluate string math
      } catch {
        display.value = "Error 😢";
      }
    }

    // ========================
    // 🎹 Keyboard Support
    // ========================
    document.addEventListener("keydown", function(event) {
      const key = event.key;

      if (!isNaN(key) || "+-*/.".includes(key)) {
        appendValue(key);
      }
      else if (key === "Enter") {
        calculate();
      }
      else if (key === "Backspace") {
        display.value = display.value.slice(0, -1);
      }
      else if (key === "Escape") {
        clearDisplay();
      }
    });
  </script>

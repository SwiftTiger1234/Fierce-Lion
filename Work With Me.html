<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Work With Us - MECA TECH</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
  <style>
   body {
      font-family: 'Orbitron', sans-serif;
      margin: 0;
      background: linear-gradient(135deg, #0d0d0d, #1a1a1a);
      color: white;
      padding: 40px;
    }
    h1 {
      text-align: center;
      color: #ff66cc; /* Pink Title */
    }
    p {
      text-align: center;
      color: #ff99dd; /* Light pink subtitle */
      margin-bottom: 20px;
    }
    form {
      max-width: 500px;
      margin: auto;
      background: #1a1a1a;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 20px #ff66cc; /* Glow */
    }
    input, textarea {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border: none;
      border-radius: 5px;
      background: #262626;
      color: white;
    }
    input:focus, textarea:focus {
      outline: none;
      box-shadow: 0 0 10px #ff66cc;
    }
    button {
      width: 100%;
      background: linear-gradient(90deg, #ff66cc, #00ffcc);
      padding: 12px;
      border: none;
      border-radius: 30px;
      color: black;
      font-weight: bold;
      cursor: pointer;
      margin-top: 15px;
      transition: 0.3s;
    }
    button:hover {
      box-shadow: 0 0 15px #ff66cc, 0 0 25px #00ffcc;
    }
  </style>
</head>
<body>

  <h1>Work With Us</h1>
  <p>Fill in your details below and we will get back to you.</p>

  <form action="mailto:your-email@example.com" method="post" enctype="text/plain">
    <input type="text" name="name" placeholder="Your Full Name" required>
    <input type="email" name="email" placeholder="Your Email Address" required>
    <textarea name="message" placeholder="Why you want to work with us..." rows="5" required></textarea>
    <button type="submit">Submit</button>
  </form>

</body>
</html>
